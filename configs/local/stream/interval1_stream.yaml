# --- Live-Streaming zu einem Web-Frontend -----------------------------------
# WebSocket-Server (daemon-Thread, non-blocking). Streamt waehrend des Runs:
#   * Gaussians als .splat-Binaerframes (frozen append-only + active full-replace)
#   * Object-Marker als JSON-Textframes (jeder gemappte KF)
# Test-Viewer: scripts/server/static/test_viewer.html im Browser oeffnen
# (oder `wscat -c ws://localhost:8765`). Default-Gate ist aus -> hier an.
stream:
  enabled: true
  host: 0.0.0.0
  port: 8765
  every_kf: 1                # alle N gemappten KFs Gaussians pushen
  max_active_splats: 200000  # Cap nur fuer den active/replace-Snapshot
  max_queue: 16              # drop-oldest-Tiefe (nur replace_active/objects droppbar)
  flat_scale_eps: 0.001      # 3. Splat-Achse fuer 2DGS-Disks (>0, sonst NaN im Viewer)

# --- Online object detection + 3D-localisation ------------------------------
detect_objects: true
object_detect_stride: 3        # detect on every 3rd tracker-KF (decoupled from mapper)

object_detector:
  kind: yolo
  model: yolo26n-obb         # YOLO26-OBB (DOTA-v1): orientierte Boxen -> Welt-Yaw
  ckpt_path: ckpts/yolo26n-obb.pt   # fehlt -> ultralytics auto-download
  conf: 0.20
  iou: 0.7
  imgsz: 1280
  device: cpu
  classes: [9, 10]           # DOTA-v1 large/small vehicle; null = alle 15
  max_det: 100
  box_shrink: 0.6
  depth_percentile: 30.0
  min_valid_px: 3
  min_pca_px: 20             # PCA-Fallback fuer Yaw/Size wenn kein OBB-Winkel da
  size_percentile: 95.0      # robust 95/5 extent spread for the 3D size
  min_depth: 0.2
  max_depth: 150.0

object_tracker:
  assoc_radius: 3.0
  min_hits: 2
  class_agnostic: false
  marker_radius: 1.5

object_output:
  csv: true
  markers_ply: true
  overlay_video: true
  overlay_fps: 10
  detections_csv: true
