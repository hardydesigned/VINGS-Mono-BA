  active_window: 12
  beta: 0.3
  buffer: 80
  c2i: None
  far_threshold: 0.02
  filter_thresh: -1.0
  frontend_nms: 1
  frontend_radius: 2
  frontend_thresh: 16.0
  frontend_window: 5
  image_size:
  - 240
  - 288
  inac_range: 3
  keyframe_thresh: 0.0
  mask_threshold: -1.0
  max_factors: 48
  save_buffer_size: 1300
  upsample: false
  show_plot: false
  skip_edge:
  - -4
  - -5
  - -6
  translation_threshold: 0.5
  warm_up: 8
  weight: /home/philipp/Dokumente/Github/VINGS-Mono-BA/ckpts/droid.pth

intrinsic:
  H: 1024
  W: 1224
  bg: 0
  cu: 520.89
  cv: 586.09
  fu: 726.64
  fv: 726.86
  resolution_scale: 1.0

middleware:
  cov_times: 1000
  max_cov: 3000.0
  max_depth: 1000

mode: vo

output:
  save_dir: /home/philipp/Dokumente/Github/VINGS-Mono-BA/output/exp_amtown03_dynamic_smoke/

storage_manager:
  cpu_prune_opacity_threshold: 0.10
  distance_threshold: 3.0

training_args:
  iters: 50
  loss_weights:
    rgb_loss: 1.0
    depth_loss: 0.5
    normal_loss: 0.1
    alpha_loss: 0.1
    dist_loss: 0.0
  lr:
    _opacity_lr: 0.05
    _rgb_lr: 0.0005
    _rotation_lr: 0.001
    _scaling_lr: 0.001
    _xyz_lr: 0.0001
  num_keyframe: 8

# --- Dynamic-object masking via swappable segmentation backend -------------
# SAM segmentiert jeden Keyframe (einmal), Segmente mit hohem Photometric-Error
# werden als dynamisch markiert und aus dem Mapping-Loss ausgeschlossen.
use_dynamic: true
segmentation:
  kind: fastsam            # none | fastsam | sam3 (future)
  model: FastSAM-x
  ckpt_path: ckpts/FastSAM-x.pt
  conf: 0.4
  iou: 0.9
  imgsz: 512
  device: cuda:0
  min_area_px: 0
  # Dynamic-Detection-Schwellen (compute_dynamic_mask)
  dyn_loss_quantile: 0.9   # Pixel oberhalb dieses Error-Quantils = "high loss"
  dyn_high_rate: 0.2       # Segment dynamisch wenn >20% high-loss-Pixel ...
  dyn_mean_loss: 0.002     # ... UND mittlerer Error > diesem Floor

use_loop: false
use_metric: false
use_pose_refine: false
seed_video_with_ext_pose: false
use_sky: false
use_storage_manager: true
use_vis: false
use_wandb: false

vis:
  bev_intrinsic_dict:
    H: 758
    W: 1372
    cu: 378.5
    cv: 685.5
    fu: 656.4
    fv: 656.4
  bev_w2c:
  - - 1
    - 0
    - 0
    - 0
