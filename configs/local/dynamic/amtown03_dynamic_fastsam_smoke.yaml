  max_frames: 100
  module: datasets.generic_vo
  rgb_strip: 1
  root: /home/philipp/Dokumente/datasets/amtown03/
  start_frame: 1000

debug_mode: false
device:
  mapper: cuda:0
  tracker: cuda:0

frame_selector:
  kind: none               # alle Tracker-KFs gehen durch (Winner-Setting)

