# --- Online object detection + 3D-localisation ------------------------------
# Master-Gate. Mit detect_objects:true wird jeder gemappte Keyframe durch den
# Detektor geschickt, jede Box per Tiefe+Pose in den DROID-Weltframe projiziert
# und zu Objekt-Tracks fusioniert. Output: objects_droid.csv +
# object_markers_droid.ply (+ object_overlay.mp4) im save_dir. Metrik/GPS spaeter
# via scripts/eval/sim3_unwarp.py --gps-csv (transformiert die Marker wie die Map).
detect_objects: true

object_detector:
  kind: yolo                 # yolo | rtdetr | none (austauschbar per Factory)
  model: yolov8s             # VisDrone-trainiertes yolov8s (mshamrai/yolov8s-visdrone)
  ckpt_path: ckpts/yolov8s-visdrone.pt
  conf: 0.25                 # Aerial: niedriger; Bodendaten: 0.35
  iou: 0.7
  imgsz: 1280                # Aerial: hoch (winzige Objekte); sonst 640
  device: cpu                # VRAM-schonend; cuda:0 wenn GPU frei
  classes: null              # VisDrone: car=3 van=4 truck=5 bus=8 ped=0 motor=9; null = alle 10
  max_det: 100
  # Tiefen-Sampling pro Box
  box_shrink: 0.6            # zentrales Fenster (gegen Hintergrund am Rand)
  depth_percentile: 30.0     # naehere Tiefe gewinnt ueber Boden dahinter
  min_valid_px: 3            # kleine Aerial-Boxen (240x288-Depth) -> niedrig
  min_depth: 0.2
  max_depth: 150.0           # Nadir-Flug ~80 m AGL: Boden liegt bei ~70-90 m!

object_tracker:              # Online-Fusion
  # interval1 = GT-ext_poses + LiDAR => METRISCHER Weltframe, also Meter:
  assoc_radius: 3.0          # m: NN-Assoziation derselben Detektion ueber KFs
  min_hits: 2                # Vorwaerts-Aerial-Flug: Objekt nur in wenigen mapped KFs
  class_agnostic: false      # true = klassen-uebergreifend mergen + Mehrheits-Voting
  marker_radius: 1.5         # PLY-Marker-Radius in m

object_output:               # welche Artefakte (online geschrieben, DROID-Frame)
  csv: true
  markers_ply: true
  overlay_video: true
  overlay_fps: 10
  detections_csv: true     # Per-Frame-Detektions-Log (frame_idx,t_sec,object_id,bbox,depth,world)
