<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AMtown03 — Map Projection + Object Detections</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0e13; overflow: hidden; font-family: system-ui, sans-serif; }
  #app { position: fixed; inset: 0; }
  #hud {
    position: fixed; top: 10px; left: 10px; z-index: 10; color: #dfe6ee;
    background: rgba(12,16,22,.78); padding: 10px 12px; border-radius: 8px;
    font-size: 12px; line-height: 1.5; max-width: 260px; backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,.08);
  }
  #hud h1 { font-size: 13px; margin: 0 0 6px; font-weight: 600; }
  #hud label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  #hud .row { margin-top: 4px; }
  #hud input[type=range] { width: 90px; }
  #legend span { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; }
  #status { position: fixed; bottom: 10px; left: 10px; z-index: 10; color: #9fb0c0; font-size: 11px;
            background: rgba(12,16,22,.7); padding: 4px 8px; border-radius: 6px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="hud">
  <h1>AMtown03 · DROID→Map</h1>
  <label><input type="checkbox" id="t-sat" checked> Satellite map</label>
  <label><input type="checkbox" id="t-cloud" checked> Gaussian cloud</label>
  <label><input type="checkbox" id="t-obj" checked> Object models</label>
  <label><input type="checkbox" id="t-path" checked> Flight path</label>
  <div class="row">Point size <input type="range" id="r-psize" min="0.2" max="4" step="0.1" value="1.7"></div>
  <div class="row">Cloud opacity <input type="range" id="r-copac" min="0.1" max="1" step="0.05" value="1"></div>
  <div class="row" id="legend"></div>
</div>
<div id="status">loading…</div>

<script type="importmap">
{ "imports": {
  "three": "./vendor/three/three.module.js",
  "three/addons/": "./vendor/addons/"
} }
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
